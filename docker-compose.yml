services:
  postgres:
    image: postgres:16
    container_name: brewdesk_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brewdesk}
      POSTGRES_USER: ${POSTGRES_USER:-brewdesk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?can dat POSTGRES_PASSWORD trong file .env}
    ports:
      - "5432:5432"
    volumes:
      - brewdesk_data:/var/lib/postgresql/data

volumes:
  brewdesk_data:
