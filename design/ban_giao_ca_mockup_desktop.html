<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bàn giao ca · BrewDesk Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1C1510;--cocoa:#442D1C;--cocoa-lt:#5C3D22;
  --rogue:#3A3D2E;--rogue-dk:#272A1F;
  --caramel:#84592B;--olive:#9D9167;--olive-mute:#C4BAA0;
  --batter:#EDE3CE;--batter-lt:#F5EDD8;--batter-warm:#E2D4B7;
  --wine:#743014;--green:#3C6E2E;--cream:#FAF6EE;
  --serif:'DM Serif Display',Georgia,serif;
  --ui:'Plus Jakarta Sans',-apple-system,sans-serif;
  --r:10px;--rl:16px;--rxl:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui);background:var(--batter);color:var(--ink);min-width:1180px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:linear-gradient(120deg,var(--ink) 0%,#2E1E12 60%,var(--cocoa-lt) 100%);box-shadow:0 1px 0 rgba(157,145,103,.2),0 4px 20px rgba(28,21,16,.45);z-index:10;position:relative}
.brand{display:flex;align-items:baseline;gap:12px}
.brand-name{font-family:var(--serif);font-style:italic;font-size:21px;color:var(--batter-lt);letter-spacing:.015em}
.brand-tag{font-size:9.5px;font-weight:700;letter-spacing:.2em;color:var(--olive);text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:16px}
.admin-badge{font-size:10px;font-weight:700;letter-spacing:.12em;padding:4px 10px;background:rgba(132,89,43,.2);border:1px solid rgba(132,89,43,.35);border-radius:999px;color:var(--caramel);text-transform:uppercase}
.avatar{width:29px;height:29px;border-radius:50%;background:linear-gradient(135deg,var(--caramel),#9A6B38);color:var(--cream);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.staff-pill{display:flex;align-items:center;gap:9px}
.staff-name{font-size:13px;font-weight:500;color:var(--olive-mute)}
.app-wrap{display:flex;height:calc(100vh - 60px)}
.sidebar{width:220px;flex-shrink:0;background:linear-gradient(to bottom,#211710,#1C1510);display:flex;flex-direction:column;padding:20px 12px;gap:4px}
.sidebar-section{font-size:9.5px;font-weight:700;letter-spacing:.12em;color:rgba(157,145,103,.5);text-transform:uppercase;padding:12px 10px 6px;margin-top:8px}
.sidebar-section:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);font-size:13px;font-weight:500;color:rgba(196,186,160,.65);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--olive-mute)}
.nav-item.active{background:rgba(58,61,46,.5);color:var(--batter-lt)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px 0}
.page-title{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--ink)}
.page-subtitle{font-size:12.5px;color:var(--olive);margin-top:2px}
.content-wrap{padding:16px 28px 28px;flex:1}
.shift-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.shift-card{background:var(--cream);border:1px solid rgba(196,186,160,.6);border-radius:var(--rl);box-shadow:0 1px 3px rgba(28,21,16,.05),0 4px 10px rgba(28,21,16,.04);padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.shift-card-head{display:flex;align-items:center;justify-content:space-between}
.shift-card-title{font-size:14px;font-weight:700;color:var(--ink)}
.shift-status{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.shift-status.open{background:rgba(132,89,43,.15);color:var(--caramel)}
.shift-status.closed{background:rgba(60,110,46,.14);color:var(--green)}
.time-row{display:flex;gap:8px}
.form-input,.form-select{height:34px;border-radius:8px;border:1px solid var(--olive-mute);background:var(--batter-lt);padding:0 10px;font-family:var(--ui);font-size:12.5px;color:var(--ink);width:100%}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--rogue)}
.field-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--olive);display:block;margin-bottom:4px}
.field-group{flex:1}
.recon-table{width:100%;border-collapse:collapse}
.recon-table th{font-size:9.5px;font-weight:700;text-transform:uppercase;color:var(--olive);padding:4px 4px;text-align:center;border-bottom:1px solid rgba(196,186,160,.5)}
.recon-table td{padding:5px 4px;border-bottom:1px solid rgba(196,186,160,.3)}
.recon-table td:first-child{font-size:11.5px;font-weight:700;color:var(--ink);width:44px}
.recon-table input{width:100%;height:28px;border-radius:6px;border:1px solid var(--olive-mute);background:var(--cream);font-size:11.5px;padding:0 6px;text-align:right}
.recon-table input.note-input{text-align:left}
.withdraw-row{display:flex;align-items:center;gap:8px;background:var(--batter-lt);border-radius:8px;padding:8px 10px}
.summary-row{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px dashed var(--olive-mute)}
.summary-label{font-size:12px;font-weight:600;color:var(--olive)}
.summary-value{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink)}

.daily-summary{background:var(--cream);border:1px solid rgba(196,186,160,.6);border-radius:var(--rl);box-shadow:0 1px 3px rgba(28,21,16,.05),0 4px 10px rgba(28,21,16,.04);padding:20px 22px}
.daily-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.daily-card{background:var(--batter-lt);border-radius:12px;padding:14px 16px}
.daily-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--olive)}
.daily-value{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink);margin-top:4px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="brand-name">BrewDesk</span><span class="brand-tag">Admin</span></div>
  <div class="topbar-right">
    <span class="admin-badge">Admin</span>
    <div class="staff-pill"><div class="avatar">AD</div><span class="staff-name">Admin</span></div>
  </div>
</header>
<div class="app-wrap">
  <nav class="sidebar">
    <div class="sidebar-section">Vận hành</div>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>POS Bán hàng</button>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checklist</button>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/></svg>Test cafe</button>
    <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Bàn giao ca</button>
    <div class="sidebar-section">Quản lý</div>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2h18l-2 7H5L3 2z"/><path d="M5 9l-1 13h16l-1-13"/><path d="M10 13h4"/></svg>Menu</button>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Kho nguyên liệu</button>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Nhân viên</button>
    <div class="sidebar-section">Báo cáo</div>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Thống kê</button>
    <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Kiểm kê kho</button>
  </nav>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Bàn giao ca</div>
        <div class="page-subtitle">19/7 · 3 ca trong ngày</div>
      </div>
    </div>
    <div class="content-wrap">
      <div class="shift-grid" id="shiftGrid"></div>
      <div class="daily-summary">
        <div class="section-title" style="font-size:13.5px;font-weight:700;margin-bottom:12px">Tổng hợp toàn ngày</div>
        <div class="daily-grid" id="dailyGrid"></div>
      </div>
    </div>
  </main>
</div>

<script>
const SHIFTS=[
  {id:'P1',label:'P1 · Ca sáng',staff:'Choi',status:'closed'},
  {id:'P2',label:'P2 · Giữa ca',staff:'Lam',status:'closed'},
  {id:'P3',label:'P3 · Ca tối',staff:'',status:'open'}
];
const ROWS=['POS','TT','CHI'];
const rowLabel={POS:'POS',TT:'TT',CHI:'Chi'};

function fmt(n){ return (n||0).toLocaleString('vi-VN'); }

function renderShiftGrid(){
  const grid=document.getElementById('shiftGrid');
  grid.innerHTML='';
  SHIFTS.forEach(s=>{
    const card=document.createElement('div');
    card.className='shift-card';
    let rowsHtml='';
    ROWS.forEach(r=>{
      rowsHtml+='<tr><td>'+rowLabel[r]+'</td>'+
        '<td><input type="number" data-shift="'+s.id+'" data-row="'+r+'" data-col="cash" placeholder="0"/></td>'+
        '<td><input type="number" data-shift="'+s.id+'" data-row="'+r+'" data-col="bank" placeholder="0"/></td>'+
        '<td><input type="text" class="note-input" data-shift="'+s.id+'" data-row="'+r+'" data-col="note" placeholder="—"/></td></tr>';
    });
    card.innerHTML=
      '<div class="shift-card-head">'+
        '<span class="shift-card-title">'+s.label+'</span>'+
        '<span class="shift-status '+(s.status==='closed'?'closed':'open')+'">'+(s.status==='closed'?'Đã chốt':'Đang mở')+'</span>'+
      '</div>'+
      '<div class="time-row">'+
        '<div class="field-group"><label class="field-label">Giờ vào</label><input class="form-input" type="time" value="'+(s.id==='P1'?'06:30':s.id==='P2'?'11:00':'17:00')+'"/></div>'+
        '<div class="field-group"><label class="field-label">Giờ ra</label><input class="form-input" type="time" '+(s.status==='open'?'':'value="'+(s.id==='P1'?'11:00':'17:00')+'"')+'/></div>'+
      '</div>'+
      '<div>'+
        '<label class="field-label">Nhân viên ký xác nhận</label>'+
        '<select class="form-select" data-role="sign" data-shift="'+s.id+'">'+
          '<option value="">— Chọn nhân viên —</option>'+
          '<option '+(s.staff==='Choi'?'selected':'')+'>Choi</option>'+
          '<option '+(s.staff==='Lam'?'selected':'')+'>Lam</option>'+
          '<option '+(s.staff==='Uyên'?'selected':'')+'>Uyên</option>'+
          '<option '+(s.staff==='Khải'?'selected':'')+'>Khải</option>'+
        '</select>'+
      '</div>'+
      '<table class="recon-table"><thead><tr><th></th><th>Tiền mặt</th><th>Chuyển khoản</th><th>Ghi chú</th></tr></thead><tbody>'+rowsHtml+'</tbody></table>'+
      '<div class="withdraw-row"><label class="field-label" style="margin:0;flex-shrink:0">Rút tiền mặt</label><input type="number" class="form-input" data-shift="'+s.id+'" data-row="WD" data-col="cash" placeholder="0"/></div>'+
      '<div class="summary-row"><span class="summary-label">Tổng ca</span><span class="summary-value" id="sum-'+s.id+'">0đ</span></div>';
    grid.appendChild(card);
  });
  grid.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',recalc));
  recalc();
}

function recalc(){
  let dayCash=0, dayBank=0, dayExpense=0, dayWithdraw=0;
  SHIFTS.forEach(s=>{
    let posCash=+document.querySelector('[data-shift="'+s.id+'"][data-row="POS"][data-col="cash"]').value||0;
    let posBank=+document.querySelector('[data-shift="'+s.id+'"][data-row="POS"][data-col="bank"]').value||0;
    let ttCash=+document.querySelector('[data-shift="'+s.id+'"][data-row="TT"][data-col="cash"]').value||0;
    let ttBank=+document.querySelector('[data-shift="'+s.id+'"][data-row="TT"][data-col="bank"]').value||0;
    let chiCash=+document.querySelector('[data-shift="'+s.id+'"][data-row="CHI"][data-col="cash"]').value||0;
    let chiBank=+document.querySelector('[data-shift="'+s.id+'"][data-row="CHI"][data-col="bank"]').value||0;
    let wd=+document.querySelector('[data-shift="'+s.id+'"][data-row="WD"][data-col="cash"]').value||0;
    const total=(posCash+posBank+ttCash+ttBank)-(chiCash+chiBank);
    document.getElementById('sum-'+s.id).textContent=fmt(total)+'đ';
    dayCash+=posCash+ttCash-chiCash-wd;
    dayBank+=posBank+ttBank-chiBank;
    dayExpense+=chiCash+chiBank;
    dayWithdraw+=wd;
  });
  document.getElementById('dailyGrid').innerHTML=
    '<div class="daily-card"><div class="daily-label">Tiền mặt còn lại</div><div class="daily-value">'+fmt(dayCash)+'đ</div></div>'+
    '<div class="daily-card"><div class="daily-label">Chuyển khoản</div><div class="daily-value">'+fmt(dayBank)+'đ</div></div>'+
    '<div class="daily-card"><div class="daily-label">Tổng chi</div><div class="daily-value">'+fmt(dayExpense)+'đ</div></div>'+
    '<div class="daily-card"><div class="daily-label">Đã rút tiền mặt</div><div class="daily-value">'+fmt(dayWithdraw)+'đ</div></div>';
}
renderShiftGrid();
</script>
</body>
</html>
