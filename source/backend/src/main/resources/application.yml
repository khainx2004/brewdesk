spring:
  application:
    name: brewdesk

  # Không đặt giá trị mặc định cho thông tin nhạy cảm — thiếu biến môi trường
  # thì app phải dừng ngay thay vì chạy với credential lộ trong source.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/brewdesk}
    username: ${DB_USER:brewdesk_user}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

brewdesk:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: 30m
    refresh-token-ttl: 7d

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.brewdesk.app: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.brewdesk.app: INFO
